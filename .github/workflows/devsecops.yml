name: DevSecOps

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Validate Flask app import
        run: python -c "from todo_project import app; print(app.name)"

  bandit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install --no-cache-dir bandit

      - name: Run Bandit
        run: |
          mkdir -p reports/bandit
          bandit -r . -x ./.venv,./reports -f json -o reports/bandit/bandit.json || true
          bandit -r . -x ./.venv,./reports -f txt -o reports/bandit/bandit.txt || true
          bandit -r . -x ./.venv,./reports -f html -o reports/bandit/bandit.html || true
          if [ ! -s reports/bandit/bandit.html ]; then
            python - <<'PY'
          from html import escape
          from pathlib import Path

          txt = Path("reports/bandit/bandit.txt")
          content = txt.read_text(errors="replace") if txt.exists() else "Relatorio TXT do Bandit nao foi gerado."
          Path("reports/bandit/bandit.html").write_text(
              "<!doctype html><html><head><meta charset='utf-8'><title>Figura 3 - Bandit</title></head>"
              "<body><h1>Figura 3 - Resultado da analise utilizando Bandit</h1>"
              "<pre>" + escape(content) + "</pre></body></html>"
          )
          PY
          fi
          cp reports/bandit/bandit.html reports/bandit/figura-3-bandit.html
          cat > reports/bandit/FIGURA_3_BANDIT.md <<'EOF'
          # Figura 3 - Resultado da analise utilizando Bandit

          Evidencia gerada automaticamente pelo GitHub Actions.

          Arquivos principais:

          - `figura-3-bandit.html`: HTML principal para captura da Figura 3.
          - `bandit.html`: relatorio visual para captura da Figura 3.
          - `bandit.txt`: saida textual da analise.
          - `bandit.json`: saida estruturada para auditoria.
          EOF
          echo "### Figura 3 - Bandit" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: figura-3-bandit" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figura-3-bandit
          path: reports/bandit/

  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        run: |
          mkdir -p reports/dependency-check
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/reports/dependency-check:/report" \
            owasp/dependency-check:latest \
            --project "DevSecOps Flask Study" \
            --scan /src \
            --out /report \
            --format HTML \
            --failOnCVSS 11
          dependency_check_exit_code=$?
          set -e
          echo "$dependency_check_exit_code" > reports/dependency-check/exit-code.txt
          if [ ! -s reports/dependency-check/dependency-check-report.html ]; then
            python - <<'PY'
          from html import escape
          from pathlib import Path

          exit_code = Path("reports/dependency-check/exit-code.txt").read_text(errors="replace").strip()
          files = "\n".join(sorted(str(p) for p in Path("reports/dependency-check").glob("*")))
          content = f"Dependency-Check nao gerou HTML final.\nExit code: {exit_code}\nArquivos gerados:\n{files}"
          Path("reports/dependency-check/dependency-check-report.html").write_text(
              "<!doctype html><html><head><meta charset='utf-8'><title>Figura 4 - OWASP Dependency-Check</title></head>"
              "<body><h1>Figura 4 - Resultado da analise utilizando OWASP Dependency-Check</h1>"
              "<pre>" + escape(content) + "</pre></body></html>"
          )
          PY
          fi
          cp reports/dependency-check/dependency-check-report.html reports/dependency-check/figura-4-owasp-dependency-check.html
          cat > reports/dependency-check/FIGURA_4_DEPENDENCY_CHECK.md <<'EOF'
          # Figura 4 - Resultado da analise utilizando OWASP Dependency-Check

          Evidencia gerada automaticamente pelo GitHub Actions.

          Arquivo principal:

          - `figura-4-owasp-dependency-check.html`: HTML principal para captura da Figura 4.
          - `dependency-check-report.html`: relatorio visual para captura da Figura 4.
          - `exit-code.txt`: codigo de saida do Dependency-Check.

          Observacao: o Dependency-Check pode retornar codigo diferente de zero quando encontra vulnerabilidades acima do limite configurado. Para o estudo de caso, o pipeline preserva o relatorio como evidencia.
          EOF
          echo "### Figura 4 - OWASP Dependency-Check" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: figura-4-owasp-dependency-check" >> "$GITHUB_STEP_SUMMARY"
          echo "Exit code do Dependency-Check: $dependency_check_exit_code" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figura-4-owasp-dependency-check
          path: reports/dependency-check/

  zap:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Flask app through Nginx
        run: docker compose up -d --build nginx

      - name: Wait for Flask app through Nginx
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs web nginx
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        continue-on-error: true
        run: |
          mkdir -p reports/zap
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-report.html \
            -w zap-report.md \
            -I
          if [ ! -s reports/zap/zap-report.html ]; then
            python - <<'PY'
          from html import escape
          from pathlib import Path

          md = Path("reports/zap/zap-report.md")
          content = md.read_text(errors="replace") if md.exists() else "Relatorio Markdown do ZAP nao foi gerado."
          Path("reports/zap/zap-report.html").write_text(
              "<!doctype html><html><head><meta charset='utf-8'><title>Figura 5 - OWASP ZAP</title></head>"
              "<body><h1>Figura 5 - Resultado da analise utilizando OWASP ZAP</h1>"
              "<pre>" + escape(content) + "</pre></body></html>"
          )
          PY
          fi
          cp reports/zap/zap-report.html reports/zap/figura-5-owasp-zap.html
          cat > reports/zap/FIGURA_5_ZAP.md <<'EOF'
          # Figura 5 - Resultado da analise utilizando OWASP ZAP

          Evidencia gerada automaticamente pelo GitHub Actions.

          Arquivos principais:

          - `figura-5-owasp-zap.html`: HTML principal para captura da Figura 5.
          - `zap-report.html`: relatorio visual para captura da Figura 5.
          - `zap-report.md`: resumo em Markdown da analise.
          EOF
          echo "### Figura 5 - OWASP ZAP" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: figura-5-owasp-zap" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figura-5-owasp-zap
          path: reports/zap/

      - name: Stop containers
        if: always()
        run: docker compose down -v
