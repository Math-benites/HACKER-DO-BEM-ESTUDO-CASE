name: DevSecOps

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Validate Flask app import
        run: python -c "from todo_project import app; print(app.name)"

  bandit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install --no-cache-dir bandit

      - name: Run Bandit
        run: |
          mkdir -p reports/bandit
          bandit -r . -x ./.venv,./reports -f json -o reports/bandit/bandit.json || true
          bandit -r . -x ./.venv,./reports -f txt -o reports/bandit/bandit.txt || true

      - name: Upload Bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: reports/bandit/

  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        run: |
          mkdir -p reports/dependency-check
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/reports/dependency-check:/report" \
            owasp/dependency-check:latest \
            --project "DevSecOps Flask Study" \
            --scan /src \
            --out /report \
            --format HTML \
            --failOnCVSS 11

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check/

  zap:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Flask app
        run: docker compose up -d --build web

      - name: Wait for Flask app
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs web
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        continue-on-error: true
        run: |
          mkdir -p reports/zap
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-report.html \
            -w zap-report.md \
            -I

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: reports/zap/

      - name: Stop containers
        if: always()
        run: docker compose down -v
