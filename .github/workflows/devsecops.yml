name: DevSecOps

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Validate Flask app import
        run: python -c "from todo_project import app; print(app.name)"

  bandit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install --no-cache-dir bandit

      - name: Run Bandit
        run: |
          mkdir -p reports/bandit
          bandit -r . -x ./.venv,./reports -f json -o reports/bandit/bandit.json || true
          bandit -r . -x ./.venv,./reports -f txt -o reports/bandit/bandit.txt || true
          bandit -r . -x ./.venv,./reports -f html -o reports/bandit/bandit.html || true

      - name: Upload Bandit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: reports/bandit/

  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p reports/dependency-check
          rm -rf reports/dependency-check/*
          nvd_args=()
          if [ -n "$NVD_API_KEY" ]; then
            nvd_args+=(--nvdApiKey "$NVD_API_KEY")
          fi

          set +e
          docker run --name dependency-check-run \
            -v "${{ github.workspace }}:/src:ro" \
            owasp/dependency-check:latest \
            --project "DevSecOps Flask Study" \
            --scan /src \
            --out /report \
            --format HTML \
            "${nvd_args[@]}" \
            --failOnCVSS 11
          dependency_check_exit_code=$?
          docker cp dependency-check-run:/report/. reports/dependency-check/ || true
          docker rm dependency-check-run
          set -e

          find reports/dependency-check -maxdepth 2 -type f -print
          test -s reports/dependency-check/dependency-check-report.html

          if [ "$dependency_check_exit_code" -ne 0 ]; then
            echo "Dependency-Check terminou com codigo $dependency_check_exit_code, mas o relatorio HTML foi preservado."
          fi

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          if-no-files-found: error

  zap:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Flask app through Nginx
        run: docker compose up -d --build nginx

      - name: Wait for Flask app through Nginx
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs web nginx
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        continue-on-error: true
        run: |
          mkdir -p reports/zap
          rm -rf reports/zap/*
          docker rm -f zap-run 2>/dev/null || true
          docker volume rm zap-reports 2>/dev/null || true
          docker volume create zap-reports

          set +e
          docker run --name zap-run --network host \
            -v zap-reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-report.html \
            -w zap-report.md \
            -I
          zap_exit_code=$?
          docker cp zap-run:/zap/wrk/zap-report.html reports/zap/zap-report.html || true
          docker cp zap-run:/zap/wrk/zap-report.md reports/zap/zap-report.md || true
          docker rm zap-run
          docker volume rm zap-reports
          set -e

          find reports/zap -maxdepth 2 -type f -print
          test -s reports/zap/zap-report.html
          test -s reports/zap/zap-report.md

          if [ "$zap_exit_code" -ne 0 ]; then
            echo "OWASP ZAP terminou com codigo $zap_exit_code, mas os relatorios foram preservados."
          fi

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: reports/zap/
          if-no-files-found: error

      - name: Stop containers
        if: always()
        run: docker compose down -v
