services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_APP: run.py
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: "5000"
    expose:
      - "5000"
    volumes:
      - sqlite_data:/app/instance
      - app_logs:/app/logs

  nginx:
    image: nginx:1.27-alpine
    command: >
      /bin/sh -c "rm -f /var/log/nginx/access.log /var/log/nginx/error.log
      && touch /var/log/nginx/access.log /var/log/nginx/error.log
      && nginx -g 'daemon off;'"
    ports:
      - "5000:80"
    volumes:
      - ./monitoring/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - web

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - nginx_logs:/var/log/nginx:ro
      - app_logs:/var/log/task-manager:ro
      - fail2ban_logs:/var/log/fail2ban:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
      - nginx

  fail2ban:
    image: crazymax/fail2ban:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: America/Sao_Paulo
      F2B_LOG_LEVEL: INFO
      F2B_LOG_TARGET: /var/log/fail2ban/fail2ban.log
      F2B_DB_PURGE_AGE: 1d
    volumes:
      - ./monitoring/fail2ban/jail.d:/data/jail.d:ro
      - ./monitoring/fail2ban/filter.d:/data/filter.d:ro
      - fail2ban_logs:/var/log/fail2ban
      - nginx_logs:/var/log/nginx:ro
      - app_logs:/var/log/task-manager:ro
    depends_on:
      - nginx
      - web

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - promtail

volumes:
  sqlite_data:
  app_logs:
  nginx_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
  fail2ban_logs:
