server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          app: task-manager
          __path__: /var/log/nginx/*.log

  - job_name: task-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask
          app: task-manager
          __path__: /var/log/task-manager/*.log

  - job_name: fail2ban
    static_configs:
      - targets:
          - localhost
        labels:
          job: fail2ban
          app: task-manager
          __path__: /var/log/fail2ban/*.log
