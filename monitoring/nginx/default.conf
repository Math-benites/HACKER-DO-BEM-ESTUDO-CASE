limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=30r/s;

upstream flask_app {
    server web:5000;
}

log_format devsecops '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                     'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time '
                     'status=$status method=$request_method path="$uri" request="$request"';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log devsecops;
    error_log /var/log/nginx/error.log warn;

    limit_req_status 429;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass http://flask_app;
    }

    location = /register {
        limit_req zone=register_zone burst=3 nodelay;
        proxy_pass http://flask_app;
    }

    location / {
        limit_req zone=general_zone burst=60 nodelay;
        proxy_pass http://flask_app;
    }
}
